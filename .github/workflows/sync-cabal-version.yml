name: Sync Cabal Version

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  sync:
    name: Sync Cabal version from release manifest
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Mint a scoped branch token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lambdasistemi
          repositories: tmux-ws
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Synchronize Cabal version
        run: |
          version="$(jq -er '."."' .release-please-manifest.json)"
          case "$version" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) printf 'invalid manifest version: %s\n' "$version" >&2; exit 1 ;;
          esac

          sed -E -i.bak "s/^(version:[[:space:]]*).*/\\1${version}/" tmux-ws.cabal
          rm tmux-ws.cabal.bak

          if git diff --quiet -- tmux-ws.cabal; then
            exit 0
          fi

          test "$(awk '$1 == "version:" { print $2; exit }' tmux-ws.cabal)" = "$version"
          git config user.name "lambdasistemi-ci[bot]"
          git config user.email "github-actions@github.com"
          git add tmux-ws.cabal
          git commit -m "chore: sync Cabal version to ${version}"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
