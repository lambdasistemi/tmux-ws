name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Validate Cabal and changelog release consistency
        run: nix run --quiet .#release-consistency
      - name: Run flake checks
        run: nix flake check --no-eval-cache
      - name: Realize development shell
        run: nix build --quiet .#devShells.x86_64-linux.default.inputDerivation

  haskell:
    name: Haskell build and tests
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build Haskell
        run: nix run --quiet .#haskell-build
      - name: Test Haskell
        run: nix run --quiet .#haskell-tests

  formatting:
    name: Formatting
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Check formatting
        run: nix run --quiet .#formatting

  hlint:
    name: HLint
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Run HLint
        run: nix run --quiet .#hlint

  cabal-package:
    name: Cabal package validation
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Validate Cabal package
        run: nix run --quiet .#cabal-package

  ui:
    name: PureScript UI
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Verify PureScript UI
        run: nix run --quiet .#ui

  workflow-lint:
    name: Workflow lint
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Lint workflows
        run: nix run --quiet .#workflow-lint

  pr-preview:
    name: PR UI preview
    if: github.event_name == 'pull_request'
    needs: build-gate
    runs-on: nixos
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build static site
        run: nix build --quiet .#site
      - name: Prepare illustrative preview
        run: |
          set -euo pipefail
          preview_dir="$RUNNER_TEMP/tmux-ws-pr-preview"
          rm -rf "$preview_dir"
          mkdir -p "$preview_dir"
          cp -RL result/. "$preview_dir/"
          chmod -R u+w "$preview_dir"
          cp ui/preview/fixture.js "$preview_dir/fixture.js"
          sed -i 's#  <script src="index.js#  <script src="fixture.js"></script>\n  <script src="index.js#' "$preview_dir/index.html"
          grep -Fq '<script src="fixture.js"></script>' "$preview_dir/index.html"
      - uses: paolino/dev-assets/static-preview@main
        with:
          path: ${{ runner.temp }}/tmux-ws-pr-preview
          comment: true

  dev-shell:
    name: Dev shell build
    needs: build-gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build from the development shell
        run: nix develop --quiet -c cabal build all -O0

  build-darwin:
    name: Darwin build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            extra-substituters = https://paolino.cachix.org
            extra-trusted-public-keys = paolino.cachix.org-1:ecmgO3CXdgSWA2cHlm4srknd/cLFMLmK3i3NrzeDFaE=
      - name: Build
        run: nix build -L

      - name: Verify rendered Homebrew formula compatibility route
        run: |
          set -euo pipefail
          tap=local/tmux-ws-red
          brew tap-new "$tap"
          trap 'brew untap --force "$tap"' EXIT
          formulas="$(brew --repository "$tap")/Formula"
          bundle="$RUNNER_TEMP/tmux-ws-bundle"
          archive="$RUNNER_TEMP/tmux-ws-0.3.0-aarch64-darwin.tar.gz"
          mkdir -p "$bundle/bin" "$bundle/libexec/lib"
          cp result/bin/tmux-ws "$bundle/bin/tmux-ws"
          COPYFILE_DISABLE=1 tar -czf "$archive" -C "$bundle" .
          sha256="$(shasum -a 256 "$archive" | awk '{ print $1 }')"
          bash scripts/render-homebrew-formulas.sh \
            "$formulas" \
            "file://$archive" \
            "$sha256" \
            0.3.0
          brew install --formula "$tap/tmux-ws"
          brew install --formula "$tap/agent-daemon"
          tmux-ws --help
          agent-daemon --help
          agent_daemon_prefix="$(brew --prefix "$tap/agent-daemon")"
          agent_daemon_link="$agent_daemon_prefix/bin/agent-daemon"
          tmux_ws_link="$(brew --prefix tmux-ws)/bin/tmux-ws"
          test -L "$agent_daemon_link"
          test ! -e "$agent_daemon_prefix/bin/tmux-ws"
          agent_daemon_target="$(readlink "$agent_daemon_link")"
          agent_daemon_identity="$(stat -L -f '%d:%i' "$agent_daemon_link")"
          tmux_ws_identity="$(stat -L -f '%d:%i' "$tmux_ws_link")"
          printf 'agent-daemon link: %s -> %s\n' "$agent_daemon_link" "$agent_daemon_target"
          printf 'agent-daemon resolved identity: %s\n' "$agent_daemon_identity"
          printf 'tmux-ws resolved identity: %s\n' "$tmux_ws_identity"
          test "$agent_daemon_identity" = "$tmux_ws_identity"
