name: Linux release artifacts

on:
  pull_request:
    branches: [main]
  push:
    tags: [v*]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-smoke:
    name: Build and smoke Linux artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify Cabal release consistency for a tag
        if: github.event_name == 'push'
        run: |
          test "${GITHUB_REF_NAME#v}" = "$(scripts/release/get-cabal-version)"
          scripts/release/check-version-consistency --mode publish
      - uses: cachix/install-nix-action@v30
      - name: Build Linux artifacts
        run: nix build -L .#linux-release-artifacts
      - name: Smoke installed Linux artifacts
        run: nix run .#linux-artifact-smoke -- --artifacts-dir "$(readlink -f result)" --artifact-version "$(scripts/release/get-cabal-version)"
      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tmux-ws-linux-${{ github.sha }}
          path: result/*
          retention-days: 30
      - name: Mint a scoped release token
        if: github.event_name == 'push'
        id: release-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lambdasistemi
          repositories: tmux-ws
          permission-contents: write
      - name: Wait for the planner-created GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          TAG: ${{ github.ref_name }}
        run: |
          for _attempt in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          printf 'planner-created release not visible for %s\n' "$TAG" >&2
          exit 1
      - name: Attach Linux assets to existing release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" result/* --clobber --repo "$GITHUB_REPOSITORY"
