site_name: tmux-ws
site_url: https://lambdasistemi.github.io/tmux-ws/docs
repo_url: https://github.com/lambdasistemi/tmux-ws
repo_name: lambdasistemi/tmux-ws

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Design: design.md
  - Deployment: deployment.md
  - Tailscale HTTPS: tailscale.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - admonition
