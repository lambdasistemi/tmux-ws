site_name: tmux-ws
site_url: https://lambdasistemi.github.io/tmux-ws/docs/
repo_url: https://github.com/lambdasistemi/tmux-ws
repo_name: lambdasistemi/tmux-ws

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - toc.integrate
    - content.code.copy

plugins:
  - search

nav:
    - Home: index.md
    - User:
        - Installation: installation.md
        - Touch usage: usage.md
    - Operator:
        - Deployment: deployment.md
        - Tailscale HTTPS: tailscale.md
        - Release and migration: release.md
    - Developer:
        - Development: development.md
        - Design: design.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - admonition
